<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SpamSentry Login | Neo-Brutalist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "accent": "#F0FF00", // Vibrant Neon Yellow
                        "brutal-bg": "#FFFFFF",
                    },
                    fontFamily: {
                        "display": ["'Space Grotesk'", "sans-serif"]
                    },
                    borderWidth: {
                        '3': '3px',
                        '4': '4px',
                        '8': '8px',
                    },
                    boxShadow: {
                        'brutal': '8px 8px 0px 0px rgba(0, 0, 0, 1)',
                        'brutal-sm': '4px 4px 0px 0px rgba(0, 0, 0, 1)',
                        'brutal-hover': '12px 12px 0px 0px rgba(0, 0, 0, 1)',
                        'brutal-accent': '8px 8px 0px 0px #F0FF00',
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-display bg-brutal-bg text-black antialiased;
            }
        }
        .neo-block {
            @apply border-4 border-black bg-white shadow-brutal transition-all;
        }
        .neo-input {
            @apply border-3 border-black p-4 rounded-none focus:ring-0 focus:outline-none focus:bg-accent/10 w-full font-bold uppercase text-sm tracking-widest;
        }
        .neo-btn {
            @apply border-3 border-black bg-accent px-8 py-4 font-bold uppercase tracking-tighter text-xl shadow-brutal-sm hover:shadow-brutal hover:-translate-x-1 hover:-translate-y-1 active:translate-x-0 active:translate-y-0 active:shadow-none transition-all;
        }
        .asymmetric-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 2rem;
        }
        @media (max-width: 768px) {
            .asymmetric-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 md:p-12 overflow-x-hidden">
<div class="fixed inset-0 z-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 30px 30px;"></div>
<main class="w-full max-w-6xl z-10 asymmetric-grid items-start">
<div class="neo-block p-10 md:p-16 space-y-8 self-start md:mt-12 rotate-[-1deg]">
<div class="inline-block border-4 border-black p-4 bg-accent">
<span class="material-symbols-outlined text-6xl font-black block">shield</span>
</div>
<div>
<h1 class="text-6xl md:text-8xl font-black uppercase leading-none tracking-tighter">
                    Spam<br/>Sentry<br/>AI
                </h1>
<p class="mt-6 text-xl font-bold uppercase border-l-8 border-black pl-4">
                    Eliminate Noise. <br/>Secure Everything.
                </p>
</div>
<div class="pt-8">
<a class="inline-block font-black text-sm uppercase tracking-[0.2em] underline decoration-4 underline-offset-8 hover:bg-accent transition-colors" href="#">
                    System Status: Operational
                </a>
</div>
</div>
<div class="space-y-8 md:mt-24">
<div class="neo-block p-8 md:p-12 rotate-[1deg] bg-white">
<h2 class="text-3xl font-black uppercase mb-10 tracking-tighter italic">Access Portal</h2>
<form action="#" class="space-y-8" method="POST">
<div class="space-y-2">
<label class="block text-sm font-black uppercase tracking-widest" for="email">
                            Identifier / Email
                        </label>
<input class="neo-input" id="email" name="email" placeholder="USER@ORG.COM" required="" type="email"/>
</div>
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block text-sm font-black uppercase tracking-widest" for="password">
                                Security Code
                            </label>
</div>
<input class="neo-input" id="password" name="password" placeholder="********" required="" type="password"/>
<div class="text-right">
<a class="text-xs font-bold uppercase underline decoration-2 underline-offset-4 hover:bg-accent" href="#">
                                Lost Code?
                            </a>
</div>
</div>
<div class="pt-4">
<button class="neo-btn w-full" type="submit">
                            Authorize Access
                        </button>
</div>
<div class="relative flex items-center py-4">
<div class="flex-grow border-t-4 border-black"></div>
<span class="flex-shrink mx-4 font-black uppercase text-xs">Auth Layer 2</span>
<div class="flex-grow border-t-4 border-black"></div>
</div>
<button class="w-full flex items-center justify-center gap-4 p-4 border-3 border-black font-bold uppercase text-sm hover:bg-black hover:text-white transition-all shadow-brutal-sm active:shadow-none translate-y-0 active:translate-y-1" type="button">
<span class="material-symbols-outlined">key</span>
<span>Google Identity</span>
</button>
</form>
</div>
<div class="neo-block bg-black text-white p-6 rotate-[-0.5deg]">
<p class="text-center font-bold uppercase tracking-widest text-sm">
                    New Recruit? 
                    <a class="text-accent hover:underline decoration-accent underline-offset-4" href="#">
                        Enlist Now
                    </a>
</p>
</div>
</div>
</main>
<div class="fixed bottom-8 left-8 z-20 hidden md:block">
<div class="border-3 border-black bg-white px-4 py-2 font-black uppercase text-[10px] tracking-[0.3em] flex items-center gap-2 shadow-brutal-sm">
<span class="material-icons text-xs">lock</span>
            Encrypted End-To-End
        </div>
</div>

</body></html>
