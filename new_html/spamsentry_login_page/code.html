<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SpamSentry | Editorial Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "accent": "#E30613", // Sharp Swiss Red
                    },
                    fontFamily: {
                        "sans": ["'Inter'", "sans-serif"]
                    },
                    letterSpacing: {
                        "tighter": "-.04em",
                        "widest": ".15em"
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-sans bg-white text-black antialiased;
            }
        }
        .swiss-input {
            @apply border-0 border-b border-black py-2 px-0 rounded-none focus:ring-0 focus:border-accent w-full text-base transition-colors duration-200 placeholder-gray-300;
        }
        .swiss-btn {
            @apply bg-black text-white px-8 py-3 text-sm font-medium hover:bg-accent transition-colors duration-300 active:scale-[0.98];
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr;
            max-width: 420px;
            width: 100%;
            gap: 4rem;
        }
        .nav-link {
            @apply text-xs font-semibold uppercase tracking-widest text-black hover:text-accent transition-colors;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-8 md:p-24 selection:bg-accent selection:text-white">
<header class="fixed top-12 left-0 right-0 px-8 md:px-24 flex justify-between items-baseline z-50">
<div class="flex items-center gap-2">
<div class="w-3 h-3 bg-accent"></div>
<span class="font-bold text-lg tracking-tighter">SPAMSENTRY AI</span>
</div>
<nav class="hidden md:block">
<a class="nav-link" href="#">System Status: 01</a>
</nav>
</header>
<main class="grid-container py-24">
<section class="space-y-4">
<span class="text-xs font-bold uppercase tracking-[0.3em] text-gray-400">Identity Layer</span>
<h1 class="text-5xl md:text-6xl font-bold tracking-tighter leading-[0.9]">
                Access the<br/>Secure Portal.
            </h1>
</section>
<section>
<form action="#" class="space-y-12" method="POST">
<div class="space-y-8">
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-gray-500" for="email">
                            User Identification
                        </label>
<input class="swiss-input" id="email" name="email" placeholder="email@domain.com" required="" type="email"/>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-gray-500" for="password">
                            Security Key
                        </label>
<input class="swiss-input" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex flex-col gap-6">
<button class="swiss-btn flex items-center justify-between" type="submit">
<span>AUTHENTICATE</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<div class="flex justify-between items-center">
<a class="text-[10px] font-bold uppercase tracking-widest hover:text-accent transition-colors" href="#">
                            Forgot Credentials
                        </a>
<span class="h-px w-8 bg-gray-200"></span>
<a class="text-[10px] font-bold uppercase tracking-widest hover:text-accent transition-colors" href="#">
                            Register Account
                        </a>
</div>
</div>
<div class="pt-8 border-t border-gray-100">
<button class="w-full flex items-center justify-center gap-3 py-3 border border-black text-[10px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all" type="button">
<span class="material-symbols-outlined text-base">passkey</span>
                        Single Sign-On
                    </button>
</div>
</form>
</section>
</main>
<footer class="fixed bottom-12 left-0 right-0 px-8 md:px-24 flex justify-between items-end pointer-events-none">
<div class="text-[10px] font-medium leading-relaxed max-w-[200px] text-gray-400">
            STRATEGIC INTELLIGENCE<br/>
            REF: SS-2024-AI-V1<br/>
            ENCRYPTED: YES
        </div>
<div class="flex items-center gap-4 pointer-events-auto">
<span class="text-[10px] font-bold uppercase tracking-widest text-accent">© 2024</span>
</div>
</footer>
<div class="fixed left-8 top-1/2 -translate-y-1/2 h-48 w-px bg-gray-100 hidden lg:block">
<div class="absolute top-0 left-0 w-1 h-4 bg-accent -translate-x-1/2"></div>
</div>

</body></html>
